name: Bug report
description: Report a reproducible problem in the project
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Do not include participant data, credentials, tokens, or security vulnerabilities. Follow SECURITY.md for private reports.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that reproduces the problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main or a commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include operating system, Node.js version, browser, and data source when relevant.
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs or screenshots
      description: Remove all personal information and secrets before attaching evidence.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report contains no sensitive data or security vulnerability.
          required: true
