name: Feature request
description: Propose a scoped improvement
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem should this change solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable acceptance criteria, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or other approaches considered.
  - type: textarea
    id: impact
    attributes:
      label: Privacy, safety, and community impact
      description: Note any effects on participant data, Indigenous knowledge, consent, accessibility, or safeguarding.
    validations:
      required: true
