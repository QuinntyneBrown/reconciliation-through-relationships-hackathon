<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule a call dialog — Reconciliation Through Relationships</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Atkinson+Hyperlegible+Next:wght@400..700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="rtr.css">
<!--
  Mirrors: ScheduleMeetingModal (src/app/connections/components/ScheduleMeetingModal.tsx),
  opened from ConnectionChat's "Schedule call" button on an active connection.
  State: default open form. currentUser = Marie (MC), partner = David (DT).
  DialogContent is max-w-md (≈448px) — set inline on .modal below.
  Pending / toast states (not shown here — they live in states-toasts.html):
    · Submit button label swaps "Schedule call" → "Creating Zoom link…" while scheduling.
    · toast.error("Please select a date and time.")  — when date or time is blank.
    · toast.error(err.error ?? "Failed to schedule meeting. Please try again.")  — on API failure.
    · toast.success("Meeting scheduled! Both participants have been notified.")  — on success (fired by ConnectionChat).
-->
<style>
  body { background: var(--birch); }
  .sc-form > * + * { margin-top: 16px; }              /* space-y-4 */
  .sc-field label {
    display: block; font-weight: 700; font-size: 15px;
    margin-bottom: 6px; color: var(--spruce-800);
  }
  .sc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }  /* grid-cols-2 gap-4 */
  .sc-actions { display: flex; gap: 12px; padding-top: 8px; }             /* flex gap-3 pt-2 */
  .sc-actions .btn { flex: 1; }
  @media (max-width: 620px) { .sc-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- Blurred faux page behind the dialog (the connection chat screen) -->
<div class="mock-page-behind" aria-hidden="true">
  <div class="skeleton-bar" style="width:40%;"></div>
  <div class="skeleton-block"></div>
  <div class="skeleton-bar" style="width:70%;"></div>
  <div class="skeleton-bar" style="width:55%;"></div>
  <div class="skeleton-block"></div>
  <div class="skeleton-bar" style="width:30%;"></div>
</div>

<div class="scrim">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="sc-title" aria-describedby="sc-desc" style="max-width:448px;">
    <button class="close" type="button" aria-label="Close">✕</button>

    <div class="modal-header">
      <h2 id="sc-title">Schedule a call</h2>
      <p class="modal-desc" id="sc-desc">A Zoom link will be created and shared with both you and David.</p>
    </div>

    <div class="modal-body">
      <div class="sc-form">
        <div class="sc-field">
          <label for="sc-topic">Topic</label>
          <input class="input" id="sc-topic" type="text" value="RTR Connection Call — Marie &amp; David">
        </div>

        <div class="sc-grid">
          <div class="sc-field">
            <label for="sc-date">Date</label>
            <input class="input" id="sc-date" type="date">
          </div>
          <div class="sc-field">
            <label for="sc-time">Time</label>
            <input class="input" id="sc-time" type="time">
          </div>
        </div>

        <div class="sc-field">
          <label for="sc-duration">Duration</label>
          <select class="select" id="sc-duration">
            <option value="30">30 minutes</option>
            <option value="60" selected>1 hour</option>
            <option value="90">1.5 hours</option>
            <option value="120">2 hours</option>
          </select>
        </div>

        <div class="sc-actions">
          <button class="btn btn-secondary" type="button">Cancel</button>
          <button class="btn btn-primary" type="button">Schedule call</button>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
